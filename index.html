<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
html,body{width:100%;height:100%;background:#f7f7f7;display:flex;justify-content:center;align-items:center}
.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.title{font-size:clamp(32px,8vw,60px);font-weight:bold;color:#222;position:absolute;top:50%;transform:translateY(-50%);transition:all 1s ease;z-index:10}
.title.move-up{top:100px;transform:translateY(0)}

.start-btn{padding:16px 40px;font-size:24px;background:#4285F4;color:white;border:none;border-radius:12px;cursor:pointer;position:absolute;top:50%;transform:translateY(100px);transition:all 1s ease;z-index:10}
.start-btn.move-down{top:100%;opacity:0;pointer-events:none}

.mode-box{display:flex;gap:30px;opacity:0;pointer-events:none;position:absolute;top:260px;z-index:20;transition:all .8s}
.mode-box.show{opacity:1;pointer-events:all}

.pvp,.ai,.online{padding:14px 32px;font-size:22px;border:none;border-radius:10px;cursor:pointer;color:white}
.pvp{background:#34A853}
.ai{background:#EA4335}
.online{background:#673AB7}

.difficulty-box{display:flex;gap:12px;opacity:0;pointer-events:none;position:absolute;top:260px;z-index:30;transition:all .8s}
.difficulty-box.show{opacity:1;pointer-events:all}
.dif-btn{padding:10px 18px;font-size:18px;border:none;border-radius:8px;color:white;cursor:pointer}
.dif-easy{background:#34A853}
.dif-normal{background:#FBBC05}
.dif-hard{background:#EA4335}
.dif-hell{background:#673AB7;opacity:.5;pointer-events:none}
.dif-hell.unlocked{opacity:1;pointer-events:all}

.status{position:absolute;top:160px;font-size:26px;font-weight:bold;opacity:0;z-index:15}
.status.show{opacity:1}

.board{display:grid;grid-template-columns:repeat(3,100px);gap:8px;position:absolute;top:100%;transition:all .5s;opacity:0;pointer-events:none;z-index:5}
.board.show{top:220px;opacity:1;pointer-events:all}
.cell{width:100px;height:100px;background:white;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer}

.end-modal{position:fixed;width:300px;background:white;padding:25px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.3);top:100%;transition:all .3s;z-index:9998;text-align:center}
.end-modal.show{top:50%;transform:translateY(-50%)}
.result{font-size:24px;font-weight:bold;margin-bottom:20px}
.btns{display:flex;gap:10px;justify-content:center}
.btn-restart{background:#4285F4;color:white;padding:10px 16px;border:none;border-radius:8px;cursor:pointer}
.btn-menu{background:#999;color:white;padding:10px 16px;border:none;border-radius:8px;cursor:pointer}

.room-modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:white;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.3);
  z-index:9999;text-align:center;display:none
}
.room-modal.show{display:block}
.room-modal input{
  padding:10px 14px;font-size:18px;width:180px;margin:10px 0;
  border:1px solid #ddd;border-radius:8px;text-align:center
}
.room-modal .btns{display:flex;gap:10px;justify-content:center;margin-top:10px}
.room-modal button{
  padding:10px 16px;border:none;border-radius:8px;
  background:#4285F4;color:white;cursor:pointer
}
.room-modal .close{background:#999}
</style>
</head>
<body>

<div class="container">
  <div class="title">井字棋</div>
  <button class="start-btn">开始游戏</button>

  <div class="mode-box">
    <button class="pvp">真人对战</button>
    <button class="ai">AI对战</button>
    <button class="online">在线联机</button>
  </div>

  <div class="difficulty-box">
    <button class="dif-btn dif-easy" data-dif="easy">简单</button>
    <button class="dif-btn dif-normal" data-dif="normal">普通</button>
    <button class="dif-btn dif-hard" data-dif="hard">困难</button>
    <button class="dif-btn dif-hell" data-dif="hell">地狱</button>
  </div>

  <div class="status"></div>
  <div class="board"></div>

  <div class="end-modal">
    <div class="result"></div>
    <div class="btns">
      <button class="btn-restart">再来一局</button>
      <button class="btn-menu">返回菜单</button>
    </div>
  </div>

  <div class="room-modal">
    <div>房间ID（英文数字随便输）</div>
    <input type="text" id="roomId" placeholder="比如: tictac01">
    <div class="btns">
      <button id="connect">连接</button>
      <button class="close">取消</button>
    </div>
  </div>
</div>

<script>
// ====================== 愚人节彩蛋 ======================
const now = new Date();
const isAprilFool = now.getMonth() === 3 && now.getDate() === 1;
if (isAprilFool) {
  document.title = "jǐng自启";
  document.querySelector(".title").textContent = "口子旗🤡";
  document.querySelector(".start-btn").textContent = "开始yóu息";
}

// ====================== DOM ======================
const title = document.querySelector('.title');
const startBtn = document.querySelector('.start-btn');
const modeBox = document.querySelector('.mode-box');
const pvpBtn = document.querySelector('.pvp');
const aiBtn = document.querySelector('.ai');
const onlineBtn = document.querySelector('.online');
const difficultyBox = document.querySelector('.difficulty-box');
const statusText = document.querySelector('.status');
const board = document.querySelector('.board');
const endModal = document.querySelector('.endModal');
const resultText = document.querySelector('.result');
const roomModal = document.querySelector('.room-modal');
const roomInput = document.getElementById('roomId');
const connectBtn = document.getElementById('connect');
const closeRoomBtn = document.querySelector('.room-modal .close');

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let cells = [];
let currentPlayer = '🔵';
let gameOver = false;
let isAI = false;
let isOnline = false;
let myRole = '';
let room = '';

// WebSocket 用你给的公共服务器
let ws;
const WS_URL = 'wss://echo.websocket.events';

// 初始化棋盘
for (let i=0; i<9; i++) {
  const c = document.createElement('div');
  c.classList.add('cell');
  c.dataset.index = i;
  c.addEventListener('click', onCellClick);
  board.appendChild(c);
  cells.push(c);
}

// ====================== WebSocket 连接 ======================
function connectWS(roomId) {
  room = roomId;
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusText.textContent = `房间: ${room} → 已连接`;
    myRole = Math.random() < 0.5 ? '🔵' : '🔴';
    syncBoard();
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.room !== room) return;

      // 落子同步
      if (data.type === 'move') {
        cells[data.index].textContent = data.player;
        currentPlayer = data.next;
        updateStatus();
        checkGame();
      }
    } catch {}
  };
}

// 发送同步
function sendMove(index) {
  if (!ws) return;
  ws.send(JSON.stringify({
    type: 'move',
    room,
    index,
    player: currentPlayer,
    next: currentPlayer === '🔵' ? '🔴' : '🔵'
  }));
}

// ====================== 点击格子 ======================
function onCellClick(e) {
  const idx = +e.target.dataset.index;
  if (cells[idx].textContent || gameOver) return;

  // 联机：只能下自己的颜色
  if (isOnline && currentPlayer !== myRole) {
    statusText.textContent = `等待 ${currentPlayer}`;
    return;
  }

  // 愚人节延迟
  if (isAprilFool && Math.random() < 0.3) {
    setTimeout(() => place(idx), 600 + Math.random()*800);
  } else {
    place(idx);
  }
}

function place(index) {
  cells[index].textContent = currentPlayer;
  if (isOnline) sendMove(index);

  currentPlayer = currentPlayer === '🔵' ? '🔴' : '🔵';
  updateStatus();
  checkGame();

  if (isAI && currentPlayer === '🔴' && !gameOver) {
    setTimeout(aiMove, 300);
  }
}

// ====================== 游戏逻辑 ======================
function updateStatus() {
  statusText.textContent = isOnline
    ? `当前：${currentPlayer} | 我：${myRole}`
    : `${currentPlayer} 回合`;
}

function checkGame() {
  const v = cells.map(x => x.textContent);
  let win = null;
  for (const p of winPatterns) {
    const [a,b,c] = p;
    if (v[a] && v[a] === v[b] && v[a] === v[c]) {
      win = v[a]; break;
    }
  }
  if (win) {
    gameOver = true;
    resultText.textContent = win + ' 胜利！';
    document.querySelector('.end-modal').classList.add('show');
    return;
  }
  if (!v.includes('')) {
    resultText.textContent = '平局';
    gameOver = true;
    document.querySelector('.end-modal').classList.add('show');
  }
}

function aiMove() {
  const empty = cells.filter(c => !c.textContent);
  if (!empty.length) return;
  let best = findWin('🔴') || findWin('🔵') || cells[4] || empty[0];
  best.textContent = '🔴';
  checkGame();
  if (!gameOver) {
    currentPlayer = '🔵';
    updateStatus();
  }
}

function findWin(m) {
  for (const p of winPatterns) {
    const [a,b,c] = p;
    if (cells[a].textContent===m && cells[b].textContent===m && !cells[c].textContent) return cells[c];
    if (cells[a].textContent===m && cells[c].textContent===m && !cells[b].textContent) return cells[b];
    if (cells[b].textContent===m && cells[c].textContent===m && !cells[a].textContent) return cells[a];
  }
  return null;
}

// ====================== 房间 ======================
onlineBtn.onclick = () => {
  isOnline = true;
  isAI = false;
  modeBox.classList.remove('show');
  roomModal.classList.add('show');
};

connectBtn.onclick = () => {
  const r = roomInput.value.trim();
  if (!r) return alert('输入房间号');
  roomModal.classList.remove('show');
  connectWS(r);
  statusText.classList.add('show');
  board.classList.add('show');
  resetBoard();
};

// ====================== 本地PVP随机先手 ======================
pvpBtn.onclick = () => {
  isOnline = false;
  isAI = false;
  modeBox.classList.remove('show');
  resetBoard();
  currentPlayer = Math.random() < 0.5 ? '🔵' : '🔴';
  updateStatus();
  statusText.classList.add('show');
  board.classList.add('show');
};

// ====================== 重置 & 菜单 ======================
function resetBoard() {
  cells.forEach(c => c.textContent = '');
  gameOver = false;
  document.querySelector('.end-modal').classList.remove('show');
  updateStatus();
}

document.querySelector('.btn-restart').onclick = resetBoard;

document.querySelector('.btn-menu').onclick = () => {
  if (ws) ws.close();
  isOnline = false;
  board.classList.remove('show');
  statusText.classList.remove('show');
  document.querySelector('.end-modal').classList.remove('show');
  setTimeout(() => {
    title.classList.remove('move-up');
    startBtn.classList.remove('move-down');
  }, 100);
};

startBtn.onclick = () => {
  title.classList.add('move-up');
  startBtn.classList.add('move-down');
  setTimeout(() => modeBox.classList.add('show'), 500);
};

aiBtn.onclick = () => {
  modeBox.classList.add('move-down');
  setTimeout(() => difficultyBox.classList.add('show'), 400);
};

document.querySelectorAll('.dif-btn').forEach(btn => {
  btn.onclick = () => {
    isAI = true;
    isOnline = false;
    difficultyBox.classList.remove('show');
    resetBoard();
    statusText.classList.add('show');
    board.classList.add('show');
  };
});

closeRoomBtn.onclick = () => {
  roomModal.classList.remove('show');
  modeBox.classList.add('show');
};

function syncBoard() {}
</script>
</body>
</html>
