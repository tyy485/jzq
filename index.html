<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
html,body{width:100%;height:100%;background:#f7f7f7;display:flex;justify-content:center;align-items:center}
.container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.title{font-size:clamp(32px,8vw,60px);font-weight:bold;color:#222;position:absolute;top:50%;transform:translateY(-50%);transition:all 1s ease;z-index:10}
.title.move-up{top:100px;transform:translateY(0)}

.start-btn{padding:16px 40px;font-size:24px;background:#4285F4;color:white;border:none;border-radius:12px;cursor:pointer;position:absolute;top:50%;transform:translateY(100px);transition:all 1s ease;z-index:10}
.start-btn.move-down{top:100%;opacity:0;pointer-events:none}

.mode-box{display:flex;gap:30px;opacity:0;pointer-events:none;position:absolute;top:260px;z-index:20;transition:all .8s}
.mode-box.show{opacity:1;pointer-events:all}
.mode-box.move-down{top:100%;opacity:0}

.pvp,.ai,.online{padding:14px 32px;font-size:22px;border:none;border-radius:10px;cursor:pointer;color:white}
.pvp{background:#34A853}
.ai{background:#EA4335}
.online{background:#673AB7;display:none}

.difficulty-box{display:flex;gap:12px;opacity:0;pointer-events:none;position:absolute;top:260px;z-index:30;transition:all .8s}
.difficulty-box.show{opacity:1;pointer-events:all}
.dif-btn{padding:10px 18px;font-size:18px;border:none;border-radius:8px;color:white;cursor:pointer}
.dif-easy{background:#34A853}
.dif-normal{background:#FBBC05}
.dif-hard{background:#EA4335}
.dif-hell{background:#673AB7;opacity:.5;pointer-events:none}
.dif-hell.unlocked{opacity:1;pointer-events:all}

.status{position:absolute;top:160px;font-size:26px;font-weight:bold;opacity:0;z-index:15}
.status.show{opacity:1}

.board{display:grid;grid-template-columns:repeat(3,100px);gap:8px;position:absolute;top:100%;transition:all .5s;opacity:0;pointer-events:none;z-index:5}
.board.show{top:220px;opacity:1;pointer-events:all}
.cell{width:100px;height:100px;background:white;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer}

.end-modal{position:fixed;width:300px;background:white;padding:25px;border-radius:16px;box-shadow:0 10px 30px #0003;top:100%;transition:all .3s;z-index:9998;text-align:center}
.end-modal.show{top:50%;transform:translateY(-50%)}
.result{font-size:24px;font-weight:bold;margin-bottom:20px}
.btns{display:flex;gap:10px;justify-content:center}
.btn-restart{background:#4285F4;color:white;padding:10px 16px;border:none;border-radius:8px;cursor:pointer}
.btn-menu{background:#999;color:white;padding:10px 16px;border:none;border-radius:8px;cursor:pointer}

.modal{display:none!important}
.cloud-box{display:none!important}
</style>
</head>
<body>

<div class="container">
  <div class="title">井字棋</div>
  <button class="start-btn">开始游戏</button>

  <div class="mode-box">
    <button class="pvp">真人对战</button>
    <button class="ai">AI对战</button>
  </div>

  <div class="difficulty-box">
    <button class="dif-btn dif-easy" data-dif="easy">简单</button>
    <button class="dif-btn dif-normal" data-dif="normal">普通</button>
    <button class="dif-btn dif-hard" data-dif="hard">困难</button>
    <button class="dif-btn dif-hell" data-dif="hell">地狱</button>
  </div>

  <div class="status"></div>
  <div class="board"></div>

  <div class="end-modal">
    <div class="result"></div>
    <div class="btns">
      <button class="btn-restart">再来一局</button>
      <button class="btn-menu">返回菜单</button>
    </div>
  </div>
</div>

<script>
const title = document.querySelector('.title');
const startBtn = document.querySelector('.start-btn');
const modeBox = document.querySelector('.mode-box');
const pvpBtn = document.querySelector('.pvp');
const aiBtn = document.querySelector('.ai');
const difficultyBox = document.querySelector('.difficulty-box');
const difBtns = document.querySelectorAll('.dif-btn');
const hellBtn = document.querySelector('.dif-hell');
const status = document.querySelector('.status');
const board = document.querySelector('.board');
const endModal = document.querySelector('.end-modal');
const resultText = document.querySelector('.result');
const btnRestart = document.querySelector('.btn-restart');
const btnMenu = document.querySelector('.btn-menu');

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let cells = [];
let current = '🔵';
let gameOver = false;
let isAI = false;
let aiLevel = '';
let gameMode = '';
let hellMode = false;
let hardWinStreak = 0;

for (let i=0;i<9;i++){
  const c = document.createElement('div');
  c.classList.add('cell');
  c.dataset.index = i;
  c.addEventListener('click', clickCell);
  board.appendChild(c);
  cells.push(c);
}

startBtn.onclick = () => {
  title.classList.add('move-up');
  startBtn.classList.add('move-down');
  setTimeout(()=>modeBox.classList.add('show'),500);
}

pvpBtn.onclick = () => {
  gameMode = 'pvp';
  isAI = false;
  modeBox.classList.remove('show');
  resetBoard();
  status.classList.add('show');
  board.classList.add('show');
}

aiBtn.onclick = () => {
  modeBox.classList.add('move-down');
  setTimeout(()=>difficultyBox.classList.add('show'),400);
}

difBtns.forEach(btn=>{
  btn.onclick = () => {
    const dif = btn.dataset.dif;
    if (dif === 'hell' && !hellBtn.classList.contains('unlocked')){
      alert('未解锁地狱难度');
      return;
    }
    isAI = true;
    aiLevel = dif;
    hellMode = dif === 'hell';
    difficultyBox.classList.remove('show');
    resetBoard();
    status.classList.add('show');
    board.classList.add('show');
    if (dif === 'hard' || dif === 'hell'){
      current = '🔴';
      status.textContent = 'AI先手';
      setTimeout(()=>{
        aiMove();
        if (hellMode) setTimeout(aiMove,300);
      },300);
    }
  }
})

function clickCell(e){
  const cell = e.target;
  const idx = +cell.dataset.index;
  if (cell.textContent || gameOver) return;

  cell.textContent = current;
  current = current === '🔵' ? '🔴' : '🔵';
  status.textContent = current === '🔵' ? '蓝方回合' : '红方回合';
  checkGame();
  if (gameOver) return;

  if (isAI && current === '🔴') setTimeout(aiMove,300);
}

function aiMove(){
  const empty = cells.filter(c=>!c.textContent);
  if (!empty.length || gameOver) return;
  let best = findWin('🔴') || findWin('🔵') || (cells[4].textContent?empty[0]:cells[4]);
  best.textContent = '🔴';
  checkGame();
  if (gameOver) return;
  current = '🔵';
  status.textContent = '蓝方回合';
}

function findWin(m){
  for(const p of winPatterns){
    const [a,b,c]=p;
    if(cells[a].textContent===m&&cells[b].textContent===m&&!cells[c].textContent)return cells[c];
    if(cells[a].textContent===m&&cells[c].textContent===m&&!cells[b].textContent)return cells[b];
    if(cells[b].textContent===m&&cells[c].textContent===m&&!cells[a].textContent)return cells[a];
  }
  return null;
}

function checkGame(){
  const v=cells.map(x=>x.textContent);
  let w=null;
  for(const p of winPatterns){
    const [a,b,c]=p;
    if(v[a]&&v[a]===v[b]&&v[a]===v[c]){w=v[a];break}
  }
  if(w){
    gameOver=true;
    resultText.textContent=w+'胜利！';
    if(w==='🔵'&&aiLevel==='hard')hardWinStreak++;
    if(w==='🔴')hardWinStreak=0;
    setTimeout(()=>endModal.classList.add('show'),300);
    return;
  }
  if(!v.includes('')){
    resultText.textContent='平局';
    gameOver=true;
    endModal.classList.add('show');
  }
}

function resetBoard(){
  cells.forEach(c=>c.textContent='');
  gameOver=false;
  current='🔵';
  endModal.classList.remove('show');
  status.textContent='蓝方回合';
}

btnRestart.onclick=()=>{
  if(gameMode==='pvp'||isAI){
    resetBoard();
    return;
  }
}

btnMenu.onclick=()=>{
  endModal.classList.remove('show');
  board.classList.remove('show');
  status.classList.remove('show');
  modeBox.classList.remove('show','move-down');
  difficultyBox.classList.remove('show');
  setTimeout(()=>{
    title.classList.remove('move-up');
    startBtn.classList.remove('move-down');
    resetBoard();
  },100);
}
</script>
</body>
</html>
