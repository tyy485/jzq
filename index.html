<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
html,body{width:100%;height:100%;background:#f7f7f7;overflow:hidden}
.container{position:relative;width:100%;height:100%}

.title{
  font-size:clamp(32px,8vw,60px);
  font-weight:bold;color:#222;
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  transition:all 0.7s ease;
  z-index:10;
  user-select:none;
}
.title.move-up{
  top:-100px;
  opacity:0;
}

.start-btn{
  padding:16px 40px;
  font-size:24px;
  background:#4285F4;color:white;
  border:none;border-radius:12px;
  cursor:pointer;
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%, 80px);
  transition:all 0.7s ease;
  z-index:11;
}
.start-btn.move-down{
  top:110%;
  opacity:0;
  pointer-events:none;
}

.back-btn{
  position:absolute;
  top:20px;left:20px;
  padding:10px 20px;
  font-size:18px;
  background:#666;color:white;
  border:none;border-radius:8px;
  cursor:pointer;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s;
}
.back-btn.show{
  opacity:1;
  pointer-events:all;
}

.mode-box{
  display:flex;gap:30px;
  position:absolute;
  left:50%;top:260px;
  transform:translateX(-50%);
  z-index:20;
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
}
.mode-box.show{
  opacity:1;
  pointer-events:all;
}
.mode-box.hide{
  opacity:0;
  transform:translate(-50%, 40px);
  pointer-events:none;
}

.pvp,.ai{
  padding:14px 32px;
  font-size:22px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  position:relative;
  z-index:21;
}
.pvp{background:#34A853}
.ai{background:#EA4335}

.difficulty-box{
  display:flex;gap:12px;
  position:absolute;
  left:50%;top:260px;
  transform:translateX(-50%);
  z-index:30;
}
.dif-btn{
  padding:10px 18px;
  font-size:18px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
  z-index:31;
}
.dif-easy{background:#34A853;transform:translateX(-60px);}
.dif-normal{background:#FB9900;transform:translateY(40px);}
.dif-hard{background:#EA4335;transform:translateX(60px);}
.dif-btn.show{
  opacity:1;
  transform:translate(0,0);
  pointer-events:all;
}

.status{
  position:absolute;
  left:50%;top:160px;
  transform:translateX(-50%);
  font-size:26px;font-weight:bold;
  opacity:0;
  z-index:15;
  transition:opacity 0.3s;
  user-select:none;
}
.status.show{opacity:1}

.board{
  display:grid;grid-template-columns:repeat(3,100px);
  gap:8px;
  position:absolute;
  left:50%;top:220px;
  transform:translateX(-50%);
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
  z-index:5;
}
.board.show{
  opacity:1;
  pointer-events:all;
}
.cell{
  width:100px;height:100px;
  background:white;
  border:2px solid #333;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  cursor:pointer;
}

/* 🔥 修复：弹窗完全藏屏幕外，不露小角 */
.end-modal{
  position:fixed;
  width:300px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  left:50%;
  top:100%;
  transform:translate(-50%, 0);
  transition:all 0.3s;
  text-align:center;
  z-index:99999;
}
.end-modal.show{
  top:50%;
  transform:translate(-50%, -50%);
}

.result{font-size:24px;font-weight:bold;margin-bottom:20px}
.btns{display:flex;gap:10px;justify-content:center}
.btn-restart,.btn-menu{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  z-index:100000;
  position:relative;
}
.btn-restart{background:#4285F4}
.btn-menu{background:#999}
</style>
</head>
<body>

<div class="container">
  <div class="title">井字棋</div>
  <button class="start-btn">开始游戏</button>
  <button class="back-btn">上一步</button>

  <div class="mode-box">
    <button class="pvp">真人对战</button>
    <button class="ai">AI 对战</button>
  </div>

  <div class="difficulty-box">
    <button class="dif-btn dif-easy" data-dif="easy">简单</button>
    <button class="dif-btn dif-normal" data-dif="normal">普通</button>
    <button class="dif-btn dif-hard" data-dif="hard">困难</button>
  </div>

  <div class="status"></div>
  <div class="board"></div>

  <div class="end-modal">
    <div class="result"></div>
    <div class="btns">
      <button class="btn-restart">再来一局</button>
      <button class="btn-menu">返回菜单</button>
    </div>
  </div>
</div>

<script>
const title = document.querySelector('.title');
const startBtn = document.querySelector('.start-btn');
const backBtn = document.querySelector('.back-btn');
const modeBox = document.querySelector('.mode-box');
const pvpBtn = document.querySelector('.pvp');
const aiBtn = document.querySelector('.ai');
const difBtns = document.querySelectorAll('.dif-btn');
const statusText = document.querySelector('.status');
const board = document.querySelector('.board');
const endModal = document.querySelector('.end-modal');
const resultText = document.querySelector('.result');
const btnRestart = document.querySelector('.btn-restart');
const btnMenu = document.querySelector('.btn-menu');

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let cells = [];
let current = '🔵';
let gameOver = false;
let isAI = false;
let history = [];
let page = 'main';
let fromMode = '';

// 初始化棋盘
for (let i=0; i<9; i++) {
  const c = document.createElement('div');
  c.classList.add('cell');
  c.dataset.index = i;
  c.addEventListener('click', clickCell);
  board.appendChild(c);
  cells.push(c);
}

function clickCell(e) {
  if (page !== 'gaming' || gameOver) return;
  const cell = e.target;
  const idx = +cell.dataset.index;
  if (cell.textContent) return;

  history.push({ index: idx, val: current });
  cell.textContent = current;
  current = current === '🔵' ? '🔴' : '🔵';
  updateStatus();
  checkGame();

  if (!gameOver && isAI && current === '🔴') {
    setTimeout(aiMove, 300);
  }
}

function updateStatus() {
  statusText.textContent = current === '🔵' ? '蓝方回合' : '红方回合';
}

function aiMove() {
  const empty = cells.filter(c => !c.textContent);
  if (!empty.length || gameOver) return;
  let best = findWin('🔴') || findWin('🔵') || (cells[4].textContent ? empty[0] : cells[4]);
  history.push({ index: +best.dataset.index, val: '🔴' });
  best.textContent = '🔴';
  checkGame();
  if (!gameOver) {
    current = '🔵';
    updateStatus();
  }
}

function findWin(m) {
  for (const p of winPatterns) {
    const [a,b,c] = p;
    if (cells[a].textContent===m && cells[b].textContent===m && !cells[c].textContent) return cells[c];
    if (cells[a].textContent===m && cells[c].textContent===m && !cells[b].textContent) return cells[b];
    if (cells[b].textContent===m && cells[c].textContent===m && !cells[a].textContent) return cells[a];
  }
  return null;
}

function checkGame() {
  const v = cells.map(x => x.textContent);
  let win = null;
  for (const p of winPatterns) {
    const [a,b,c] = p;
    if (v[a] && v[a]===v[b] && v[a]===v[c]) { win=v[a]; break; }
  }
  if (win) {
    gameOver = true;
    resultText.textContent = win + ' 胜利！';
    endModal.classList.add('show');
    return;
  }
  if (!v.includes('')) {
    gameOver = true;
    resultText.textContent = '平局';
    endModal.classList.add('show');
  }
}

function resetBoard() {
  cells.forEach(c => c.textContent = '');
  gameOver = false;
  endModal.classList.remove('show');
  current = '🔵';
  history = [];
  updateStatus();
}

// 开始游戏
startBtn.onclick = () => {
  page = 'mode';
  title.classList.add('move-up');
  startBtn.classList.add('move-down');
  setTimeout(() => {
    modeBox.classList.add('show');
    backBtn.classList.add('show');
  }, 400);
};

// 上一步
backBtn.onclick = () => {
  if (page === 'mode') {
    page = 'main';
    modeBox.classList.remove('show');
    backBtn.classList.remove('show');
    title.classList.remove('move-up');
    startBtn.classList.remove('move-down');
  }
  else if (page === 'aiDiff') {
    page = 'mode';
    difBtns.forEach(b => b.classList.remove('show'));
    setTimeout(() => {
      modeBox.classList.remove('hide');
      modeBox.classList.add('show');
    }, 100);
  }
  else if (page === 'gaming') {
    if (history.length > 0) {
      const last = history.pop();
      cells[last.index].textContent = '';
      current = last.val;
      updateStatus();
      gameOver = false;
      endModal.classList.remove('show');
    } else {
      page = fromMode;
      board.classList.remove('show');
      statusText.classList.remove('show');
      setTimeout(() => {
        modeBox.classList.remove('hide');
        modeBox.classList.add('show');
      }, 100);
    }
  }
};

// 真人对战
pvpBtn.onclick = () => {
  isAI = false;
  fromMode = 'mode';
  page = 'gaming';
  modeBox.classList.remove('show');
  modeBox.classList.add('hide');
  setTimeout(() => {
    resetBoard();
    statusText.classList.add('show');
    board.classList.add('show');
  }, 200);
};

// AI 对战
aiBtn.onclick = () => {
  isAI = true;
  page = 'aiDiff';
  modeBox.classList.remove('show');
  modeBox.classList.add('hide');
  setTimeout(() => {
    difBtns.forEach(btn => btn.classList.add('show'));
  }, 200);
};

// 难度选择
difBtns.forEach(btn => {
  btn.onclick = () => {
    fromMode = 'mode';
    page = 'gaming';
    difBtns.forEach(b => b.classList.remove('show'));
    setTimeout(() => {
      resetBoard();
      statusText.classList.add('show');
      board.classList.add('show');
    }, 200);
  };
});

btnRestart.onclick = resetBoard;

btnMenu.onclick = () => {
  endModal.classList.remove('show');
  board.classList.remove('show');
  statusText.classList.remove('show');
  difBtns.forEach(b => b.classList.remove('show'));
  resetBoard();
  setTimeout(() => {
    modeBox.classList.remove('hide');
    modeBox.classList.add('show');
    page = 'mode';
  }, 100);
};
</script>
</body>
</html>
